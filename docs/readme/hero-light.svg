  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#grid)"/>
  <path d="M74 348C242 262 329 374 491 284C640 201 752 224 900 143C1007 84 1084 92 1140 49" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.20"/>
  <path d="M0 64H1200" stroke="#1d3557" stroke-opacity="0.07"/>
  <path d="M0 356H1200" stroke="#1d3557" stroke-opacity="0.07"/>
  <path d="M103 -22L1234 335" stroke="url(#shine)" stroke-width="72" opacity="0.50"/>

  <rect x="64" y="58" width="1072" height="304" rx="30" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.92" filter="url(#shadow)"/>
  <rect x="65" y="59" width="1070" height="302" rx="29" fill="none" stroke="#0078d4" stroke-opacity="0.08"/>

