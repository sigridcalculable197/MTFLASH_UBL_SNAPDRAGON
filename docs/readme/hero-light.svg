<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="MTFLASH UBL Snapdragon v1.3 premium EDL storage interface">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#edf4ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.52" stop-color="#ffffff" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="panelStrong" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f4f8ff" stop-opacity="0.90"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0078d4"/>
      <stop offset="0.42" stop-color="#6554ff"/>
      <stop offset="0.78" stop-color="#00a875"/>
      <stop offset="1" stop-color="#c77700"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
