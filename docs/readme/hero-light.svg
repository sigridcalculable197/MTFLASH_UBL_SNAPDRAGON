      <text x="167" y="22" fill="#007c58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">UFS SAFETY</text>
      <rect x="303" y="0" width="156" height="34" rx="17" fill="#c77700" fill-opacity="0.10" stroke="#c77700" stroke-opacity="0.28"/>
