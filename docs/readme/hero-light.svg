      <text x="39" y="116" fill="#536179" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">DEVPRG</text>
      <text x="14" y="143" fill="#00885f" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="800">SK hynix - 509.2 GB</text>
