    <text x="0" y="104" fill="#101827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="850" letter-spacing="0">MTFLASH UBL</text>
    <text x="2" y="158" fill="#2d3a58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="760" letter-spacing="1">SNAPDRAGON</text>
