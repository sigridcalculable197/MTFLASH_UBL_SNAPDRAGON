    <g transform="translate(174 70)">
      <rect x="0" y="0" width="238" height="154" rx="18" fill="#ffffff" fill-opacity="0.74" stroke="#dfe8f5" stroke-opacity="1"/>
      <text x="18" y="29" fill="#101827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="830">UFS Storage Profile</text>
      <text x="18" y="54" fill="#637083" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">HN8T274EJKX130</text>
      <rect x="18" y="74" width="92" height="30" rx="15" fill="#00a875" fill-opacity="0.10" stroke="#00a875" stroke-opacity="0.30"/>
      <text x="39" y="94" fill="#007c58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="850">SAFE</text>
      <rect x="122" y="74" width="92" height="30" rx="15" fill="#0078d4" fill-opacity="0.10" stroke="#0078d4" stroke-opacity="0.30"/>
      <text x="144" y="94" fill="#0067b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="850">6 LUN</text>
      <path d="M18 121H214" stroke="#1d3557" stroke-opacity="0.10"/>
      <text x="18" y="143" fill="#536179" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="680">Capacity 509.2 GB - FW 104</text>
