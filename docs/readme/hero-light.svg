      <rect x="14" y="16" width="98" height="28" rx="14" fill="#0078d4" fill-opacity="0.92"/>
      <text x="32" y="35" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="850">CHECK</text>
