<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="MTFLASH UBL Snapdragon v1.3 compact storage log fix">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0c"/>
      <stop offset="1" stop-color="#111214"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18191c" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#101113" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151619"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.026"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="32" fill="url(#grid)"/>

  <rect x="64" y="54" width="1072" height="312" rx="26" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.11" filter="url(#shadow)"/>
  <path d="M64 117H1136" stroke="#ffffff" stroke-opacity="0.06"/>

  <g transform="translate(96 88)">
    <rect x="0" y="0" width="270" height="38" rx="10" fill="#0f1012" stroke="#2b2d32"/>
    <circle cx="20" cy="19" r="7" fill="#30d158"/>
    <text x="39" y="24" fill="#e8e8e8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.8">V1.3 STORAGE LOG FIX</text>

    <text x="0" y="106" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="850">MTFLASH UBL</text>
    <text x="2" y="154" fill="#bfc4cf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="1">SNAPDRAGON</text>
    <rect x="2" y="180" width="420" height="3" rx="1.5" fill="#0a84ff"/>
    <text x="0" y="219" fill="#a2a8b3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Compact dark UI for unlock, EDL, Fastboot,</text>
    <text x="0" y="247" fill="#a2a8b3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">storage safety, firmware, and root workflows.</text>

    <g transform="translate(0 286)">
      <rect x="0" y="0" width="126" height="30" rx="8" fill="#101113" stroke="#2b2d32"/>
      <text x="19" y="20" fill="#d6d9df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="800">9008 READY</text>
      <rect x="140" y="0" width="150" height="30" rx="8" fill="#101113" stroke="#2b2d32"/>
      <text x="162" y="20" fill="#d6d9df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="800">COMPACT LOG</text>
      <rect x="304" y="0" width="150" height="30" rx="8" fill="#101113" stroke="#2b2d32"/>
      <text x="326" y="20" fill="#d6d9df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="800">KIOXIA BLOCK</text>
    </g>
  </g>

  <g transform="translate(648 86)">
    <rect x="0" y="0" width="442" height="248" rx="18" fill="url(#screen)" stroke="#2b2d32"/>
    <rect x="0" y="0" width="442" height="42" rx="18" fill="#121317"/>
    <path d="M0 42H442" stroke="#262626"/>
    <circle cx="24" cy="21" r="6.5" fill="#30d158"/>
    <circle cx="45" cy="21" r="6.5" fill="#febc2e"/>
