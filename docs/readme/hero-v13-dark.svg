      <text x="28" y="33" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="800">CHECK</text>
      <rect x="12" y="56" width="90" height="24" rx="7" fill="#111111" stroke="#262626"/>
      <text x="31" y="72" fill="#8d929c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">ROM XML</text>
      <rect x="12" y="93" width="90" height="24" rx="7" fill="#111111" stroke="#262626"/>
      <text x="36" y="109" fill="#8d929c" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">DEVPRG</text>
      <text x="12" y="145" fill="#30d158" font-family="Consolas, Courier New, monospace" font-size="9" font-weight="700">SK hynix 509.2 GB</text>
    </g>

    <g transform="translate(154 60)">
      <rect x="0" y="0" width="266" height="160" rx="12" fill="#141414" stroke="#262626"/>
