        <circle cx="21" cy="12" r="11" fill="#101113" stroke="#2f3338"/>
        <path d="M16 12l4 4 8-9" fill="none" stroke="#30d158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="42" y="11" fill="#f0f0f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">UFS Storage Profile</text>
        <text x="42" y="27" fill="#30d158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700">Supported storage</text>
        <rect x="210" y="4" width="42" height="20" rx="7" fill="#101113" stroke="#2f3338"/>
        <text x="222" y="18" fill="#a2a8b3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="9" font-weight="800">UFS</text>
      </g>
      <path d="M14 52H252" stroke="#262626"/>
      <text x="14" y="78" fill="#f0f0f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">SK hynix</text>
      <text x="196" y="78" fill="#a2a8b3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">509.2 GB</text>
      <text x="14" y="98" fill="#8d929c" font-family="Consolas, Courier New, monospace" font-size="10">HN8T274EJKX130</text>
      <g font-family="Consolas, Courier New, monospace" font-size="10">
        <text x="14" y="124" fill="#6f7580">LUN</text><text x="72" y="124" fill="#d6d9df">6</text>
        <text x="132" y="124" fill="#6f7580">FW</text><text x="184" y="124" fill="#d6d9df">104</text>
        <text x="14" y="145" fill="#6f7580">ID</text><text x="72" y="145" fill="#d6d9df">0x1AD / 429</text>
      </g>
