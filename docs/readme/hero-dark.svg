<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="MTFLASH UBL Snapdragon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07090f"/>
      <stop offset="0.48" stop-color="#10141f"/>
      <stop offset="1" stop-color="#06070b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d1ff"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#23e6a8"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.72 0 0 0 0 1 0 0 0 0.58 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="170" cy="84" r="136" fill="#00c8ff" opacity="0.20" filter="url(#softGlow)"/>
  <circle cx="1030" cy="320" r="154" fill="#23e6a8" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="900" cy="70" r="110" fill="#7c5cff" opacity="0.18" filter="url(#softGlow)"/>

  <path d="M54 335 C190 265 276 372 420 292 C559 215 634 246 778 184 C920 123 1014 170 1150 92" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.28"/>
  <path d="M72 96 H1128" stroke="#ffffff" stroke-opacity="0.08"/>
  <path d="M72 327 H1128" stroke="#ffffff" stroke-opacity="0.08"/>

  <rect x="68" y="72" width="1064" height="276" rx="26" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.20" filter="url(#shadow)"/>
  <rect x="96" y="100" width="188" height="42" rx="21" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="126" y="127" fill="#b9f4ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="2">VERSION 1.2</text>

  <text x="96" y="190" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="0">MTFLASH UBL</text>
  <text x="96" y="245" fill="#d8e2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="1">SNAPDRAGON</text>
  <rect x="98" y="270" width="430" height="4" rx="2" fill="url(#accent)"/>
  <text x="96" y="310" fill="#b8c2d6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500">Unlock, firmware, EDL, Fastboot, storage safety, and root workflows</text>

  <g transform="translate(704 116)">
    <rect x="0" y="0" width="360" height="192" rx="24" fill="#08101a" fill-opacity="0.70" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="26" y="28" width="132" height="34" rx="17" fill="#00d1ff" fill-opacity="0.16" stroke="#00d1ff" stroke-opacity="0.40"/>
    <text x="44" y="51" fill="#c7f7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">EDL SAFE</text>
    <rect x="176" y="28" width="148" height="34" rx="17" fill="#23e6a8" fill-opacity="0.14" stroke="#23e6a8" stroke-opacity="0.36"/>
    <text x="195" y="51" fill="#d7fff2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">UFS CHECK</text>
    <text x="30" y="98" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="750">Kioxia/Toshiba blocking</text>
    <text x="30" y="130" fill="#aeb9cb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Vendor, product, capacity, LUN,</text>
    <text x="30" y="154" fill="#aeb9cb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">firmware, and serial parsing.</text>
  </g>
</svg>
