      <text x="18" y="29" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="830">UFS Storage Profile</text>
      <text x="18" y="54" fill="#9ba8ba" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">HN8T274EJKX130</text>
      <rect x="18" y="74" width="92" height="30" rx="15" fill="#23e6a8" fill-opacity="0.14" stroke="#23e6a8" stroke-opacity="0.35"/>
      <text x="39" y="94" fill="#d6fff1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="850">SAFE</text>
      <rect x="122" y="74" width="92" height="30" rx="15" fill="#0ac8ff" fill-opacity="0.14" stroke="#0ac8ff" stroke-opacity="0.35"/>
      <text x="144" y="94" fill="#c8f6ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="850">6 LUN</text>
