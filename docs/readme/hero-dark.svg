  <path d="M74 348C242 262 329 374 491 284C640 201 752 224 900 143C1007 84 1084 92 1140 49" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.25"/>
  <path d="M0 64H1200" stroke="#ffffff" stroke-opacity="0.06"/>
  <path d="M0 356H1200" stroke="#ffffff" stroke-opacity="0.06"/>
  <path d="M103 -22L1234 335" stroke="url(#shine)" stroke-width="72" opacity="0.18"/>

  <rect x="64" y="58" width="1072" height="304" rx="30" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.18" filter="url(#shadow)"/>
